services:
  memory-postgres:
    image: postgres:16-alpine
    container_name: salesbot-memory-postgres
    env_file:
      - ./env
    ports:
      - "5432:5432"
    volumes:
      - memory_postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  memory-redis:
    image: redis:7.4-alpine
    container_name: salesbot-memory-redis
    env_file:
      - ./env
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    ports:
      - "6379:6379"
    volumes:
      - memory_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # APPLICATION
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: salesbot-app
    ports:
      - "5050:5051"  # Host:Container
    env_file:
      - ./env
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=5051
      - LOG_LEVEL=INFO
      - MEMORY_DB_HOST=memory-postgres
      - MEMORY_DB_PORT=5432
      - MEMORY_DB_SSLMODE=disable
      - MEMORY_REDIS_HOST=memory-redis
      - MEMORY_REDIS_PORT=6379
    volumes:
      - ./logs:/app/logs
      - ./envConfig:/app/envConfig:ro
      # Mount source code for development (hot reload)
      - ./communicationPlane:/app/communicationPlane:ro
      - ./controlplane:/app/controlplane:ro
      - ./models:/app/models:ro
      - ./shared:/app/shared:ro
    depends_on:
      memory-postgres:
        condition: service_healthy
      memory-redis:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # OBSERVABILITY STACK
  # ============================================
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yml:/etc/loki/local-config.yaml
      - ./observability/data/loki:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    volumes:
      - ./observability/promtail-config.yml:/etc/promtail/config.yml
      - ./logs:/var/log/salesbot:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.0.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/data/grafana:/var/lib/grafana
      - ./observability/grafana-provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  memory_postgres_data:
  memory_redis_data:
