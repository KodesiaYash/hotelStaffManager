name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff lint
        run: python -m ruff check .

  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff format
        run: python -m ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Mypy
        run: python -m mypy .

  bandit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Bandit
        run: python -m bandit -c bandit.yaml -r .

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Pip audit
        run: python -m pip_audit -r requirements.txt -r requirements-dev.txt

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Run unit tests
        env:
          PYTHONPATH: .
        run: pytest -m "not integration"

  integration-tests:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
      SALES_AUDIT_SHEET_ID: ${{ secrets.SALES_AUDIT_SHEET_ID }}
      SALES_PRICELIST_SHEET_ID: ${{ secrets.SALES_PRICELIST_SHEET_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ENABLE_WRITE_TESTS: ${{ secrets.ENABLE_WRITE_TESTS }}
      ENABLE_TESTPY_INTEGRATION: ${{ secrets.ENABLE_TESTPY_INTEGRATION }}
    if: ${{ env.GOOGLE_SHEETS_JSON != '' && env.SALES_AUDIT_SHEET_ID != '' && env.SALES_PRICELIST_SHEET_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Prepare integration secrets
        run: |
          mkdir -p /tmp/credentials
          printf '%s' "$GOOGLE_SHEETS_JSON" > /tmp/credentials/service_account.json
      - name: Run integration tests
        env:
          PYTHONPATH: .
          GOOGLE_SHEETS_KEY: /tmp/credentials/service_account.json
          HEALTHCHECK_WRITE: ${{ env.ENABLE_WRITE_TESTS }}
          HEALTHCHECK_TESTPY: ${{ env.ENABLE_TESTPY_INTEGRATION }}
        run: pytest -m integration
