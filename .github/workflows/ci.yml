name: CI

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff lint
        run: python -m ruff check .

  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff format
        run: python -m ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Mypy
        run: python -m mypy .

  bandit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Bandit
        run: python -m bandit -c bandit.yaml -r .

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Pip audit
        run: python -m pip_audit -r requirements.txt -r requirements-dev.txt

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Run unit tests
        env:
          PYTHONPATH: .
        run: pytest tests/unit

  tunnel-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check tunnel token
        id: tunnel
        env:
          TUNNEL_TOKEN: ${{ secrets.TUNNEL_TOKEN }}
        run: |
          if [[ -n "${TUNNEL_TOKEN}" ]]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install cloudflared
        if: ${{ steps.tunnel.outputs.has_token == 'true' }}
        run: |
          sudo curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          sudo chmod +x /usr/local/bin/cloudflared
      - name: Tunnel smoke test
        if: ${{ steps.tunnel.outputs.has_token == 'true' }}
        env:
          TUNNEL_TOKEN: ${{ secrets.TUNNEL_TOKEN }}
        run: |
          set +e
          timeout 15s cloudflared tunnel run --token "${TUNNEL_TOKEN}"
          status=$?
          if [[ $status -eq 124 || $status -eq 0 ]]; then
            exit 0
          fi
          exit $status

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check integration secrets
        id: secrets
        env:
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
          SALES_AUDIT_SHEET_ID: ${{ secrets.SALES_AUDIT_SHEET_ID }}
          SALES_PRICELIST_SHEET_ID: ${{ secrets.SALES_PRICELIST_SHEET_ID }}
        run: |
          if [[ -n "${GOOGLE_SHEETS_JSON}" && -n "${SALES_AUDIT_SHEET_ID}" && -n "${SALES_PRICELIST_SHEET_ID}" ]]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Python
        if: ${{ steps.secrets.outputs.has_secrets == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        if: ${{ steps.secrets.outputs.has_secrets == 'true' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Prepare integration secrets
        if: ${{ steps.secrets.outputs.has_secrets == 'true' }}
        env:
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
        run: |
          mkdir -p /tmp/credentials
          printf '%s' "$GOOGLE_SHEETS_JSON" > /tmp/credentials/service_account.json
      - name: Run integration tests
        if: ${{ steps.secrets.outputs.has_secrets == 'true' }}
        env:
          PYTHONPATH: .
          GOOGLE_SHEETS_KEY: /tmp/credentials/service_account.json
          SALES_AUDIT_SHEET_ID: ${{ secrets.SALES_AUDIT_SHEET_ID }}
          SALES_PRICELIST_SHEET_ID: ${{ secrets.SALES_PRICELIST_SHEET_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HEALTHCHECK_WRITE: ${{ secrets.ENABLE_WRITE_TESTS }}
          HEALTHCHECK_TESTPY: ${{ secrets.ENABLE_TESTPY_INTEGRATION }}
        run: pytest tests/integration -m integration
